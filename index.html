<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encuesta completa</title>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: Arial;
    background: #f4f6f8;
  }
  .container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
  }
  textarea, select, input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
  }
  button {
    background: green;
    color: white;
    padding: 10px;
    border: none;
  }
  canvas {
    margin-top: 40px;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Encuesta: Comercialización directa</h2>

  <form id="form">
    <label>1. ¿Conoces alguna plataforma?</label>
    <select id="p1" required>
      <option value="">Selecciona</option>
      <option value="Sí">Sí</option>
      <option value="No">No</option>
    </select>

    <label>2. ¿Cuál?</label>
    <input type="text" id="p2">

    <label>3. ¿Por qué crees que no existen?</label>
    <textarea id="p3"></textarea>

    <label>4. ¿Son accesibles?</label>
    <select id="p4">
      <option value="">Selecciona</option>
      <option value="Sí">Sí</option>
      <option value="No">No</option>
      <option value="No sé">No sé</option>
    </select>

    <label>5. ¿Qué necesitaría?</label>
    <textarea id="p5"></textarea>

    <label>6. ¿Quién podría ayudar?</label>
    <textarea id="p6"></textarea>

    <label>7. ¿Cómo la promoverías?</label>
    <textarea id="p7"></textarea>

    <button type="submit">Enviar respuesta</button>
  </form>

  <h3>Resultados en tiempo real</h3>
  <canvas id="grafico"></canvas>
</div>

<!-- Firebase + lógica -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 PON TUS DATOS AQUÍ
const firebaseConfig = {
  apiKey: "AIzaSyCWk5vwOSvpb5TzH_8RasOyiIqEJjpQLHI",
  authDomain: "exer-community.firebaseapp.com",
  projectId: "exer-community"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📩 Enviar respuestas
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const datos = {
    p1: document.getElementById("p1").value,
    p2: document.getElementById("p2").value,
    p3: document.getElementById("p3").value,
    p4: document.getElementById("p4").value,
    p5: document.getElementById("p5").value,
    p6: document.getElementById("p6").value,
    p7: document.getElementById("p7").value
  };

  await addDoc(collection(db, "encuestas"), datos);

  alert("✅ Respuesta enviada");
  document.getElementById("form").reset();
});

let chart;

// 📊 Escuchar datos en tiempo real
onSnapshot(collection(db, "encuestas"), (snapshot) => {
  let si = 0;
  let no = 0;

  snapshot.forEach(doc => {
    const r = doc.data().p1;
    if (r === "Sí") si++;
    if (r === "No") no++;
  });

  actualizarGrafico(si, no);
});

function actualizarGrafico(si, no) {
  const ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Sí", "No"],
      datasets: [{
        data: [si, no],
        backgroundColor: ["green", "red"]
      }]
    }
  });
}
</script>
